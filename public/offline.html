<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You&rsquo;re offline — Paramatma</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fbf7ef;
        color: #2b2118;
        font-family: Georgia, "Noto Serif", serif;
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      .card {
        max-width: 28rem;
      }
      .om {
        font-size: 3rem;
        color: #a8792e;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #6e5f4f;
        line-height: 1.6;
        margin: 0;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1b1713;
          color: #f0e7d8;
        }
        p {
          color: #a89a87;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="om" aria-hidden="true">ॐ</div>
      <h1>You&rsquo;re offline</h1>
      <p>
        This page hasn&rsquo;t been saved for offline reading yet. Reconnect
        and open it once — after that it&rsquo;ll be here even without a
        signal.
      </p>
    </div>
  </body>
</html>
